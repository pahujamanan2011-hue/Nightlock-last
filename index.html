<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NightLock: Last Light</title>

<style>

*,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:monospace;
}

#wrap{
    position:relative;
    width:100%;
    height:100%;
}

canvas{
    display:block;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
}

#gameCanvas{
    z-index:1;
    cursor:crosshair;
}

#uiCanvas{
    z-index:2;
    pointer-events:none;
}

.hidden{
    display:none;
}

#menu{
    position:absolute;
    inset:0;
    z-index:10;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:18px;

    background:
    radial-gradient(circle at center,
    rgba(40,0,0,0.7),
    rgba(0,0,0,0.96));
}

#menu h1{
    color:#ff3300;
    font-size:48px;
    text-shadow:0 0 12px #aa0000;
    margin-bottom:20px;
}

#menu button{
    width:240px;
    padding:15px;

    border:2px solid #551100;

    background:#180000;

    color:#ff7700;

    font-size:20px;
    font-weight:bold;

    cursor:pointer;

    transition:0.15s;
}

#menu button:hover{
    background:#441100;
    transform:scale(1.04);
}

#helpPanel{
    width:340px;

    margin-top:15px;
    padding:18px;

    background:rgba(20,0,0,0.92);

    border:2px solid #662200;

    color:#ffcc88;

    line-height:1.8;

    text-align:left;
}

#helpPanel h2{
    margin-bottom:10px;
    color:#ff5500;
}

#credits{
    position:absolute;

    right:20px;
    bottom:20px;

    color:#884400;

    font-size:14px;
}

#hud{
    position:absolute;

    top:0;
    left:0;

    width:100%;

    z-index:5;

    pointer-events:none;

    color:white;

    padding:10px;
}

#score,
#ammoText,
#weaponIcon,
#livesUI{
    margin-bottom:6px;
    font-size:18px;
}

</style>
</head>

<body>

<div id="menu">

    <h1>NightLock: Last Light</h1>

    <button id="startBtn">START GAME</button>

    <button id="helpBtn">HELP</button>

    <button id="quitBtn">QUIT</button>

    <div id="helpPanel" class="hidden">

        <h2>CONTROLS</h2>

        <p>WASD / Arrow Keys → Move</p>

        <p>Mouse → Aim</p>

        <p>Left Click / SPACE → Shoot</p>

        <p>1 → Pistol</p>

        <p>2 → Shotgun</p>

        <p>P → Pause</p>

        <p>ENTER → Restart</p>

    </div>

    <div id="credits">
        Created by Manan Pahuja
    </div>

</div>

<div id="hud" class="hidden">

    <div id="score">0</div>

    <div id="ammoText">60</div>

    <div id="weaponIcon">🔫</div>

    <div id="livesUI"></div>

</div>

<div id="wrap">

    <canvas id="gameCanvas" tabindex="1"></canvas>
    <canvas id="uiCanvas"></canvas>

</div>


<script>

window.addEventListener('DOMContentLoaded', () => {

    const menu = document.getElementById('menu');

    const hud = document.getElementById('hud');

    const startBtn = document.getElementById('startBtn');

    const quitBtn = document.getElementById('quitBtn');

    const helpBtn = document.getElementById('helpBtn');

    const helpPanel = document.getElementById('helpPanel');

    const gameCanvas = document.getElementById('gameCanvas');

    // HELP BUTTON

    helpBtn.addEventListener('click', () => {

        helpPanel.classList.toggle('hidden');

    });

    // START BUTTON

    startBtn.addEventListener('click', () => {

        menu.style.display = 'none';

        hud.classList.remove('hidden');

        gameCanvas.focus();

        // Tell game engine to start if variables exist

        if (typeof gameRunning !== 'undefined') {

            gameRunning = true;

        }

        if (typeof generateBarrels === 'function') {

            generateBarrels();

        }

        if (typeof updateLives === 'function') {

            updateLives();

        }

        if (typeof updateAmmoUI === 'function') {

            updateAmmoUI();

        }

        if (typeof startBGMusic === 'function') {

            startBGMusic();

        }

    });

    // QUIT BUTTON

    quitBtn.addEventListener('click', () => {

        location.reload();

    });

});


</script>

<script src="game_complete.js"></script>

</body>
</html>
